name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Agents & Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate agents and skills
        run: node tests/validate-agents.mjs

      - name: Run skill behavioral tests
        run: node tests/test-skills.mjs

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Validate package
        run: npm pack --dry-run

  cli:
    name: CLI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test CLI commands
        run: |
          node cli/index.mjs list
          node cli/index.mjs --help || true

      - name: Test native hooks
        run: node tests/test-native-hooks.mjs

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON files
        run: |
          error=0
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f'))" 2>/dev/null; then
              echo "ERROR: Invalid JSON in $f"
              error=1
            fi
          done
          exit $error

      - name: Check for secrets in code
        run: |
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}\|AKIA[A-Z0-9]\{16\}\|ghp_[a-zA-Z0-9]\{36\}' \
            --include="*.ts" --include="*.js" --include="*.mjs" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "ERROR: Potential secret found in source code"
            exit 1
          fi
          echo "No secrets detected"

      - name: Validate markdown structure
        run: |
          error=0
          for f in agents/*.md packs/*/agents/*.md; do
            if [ -f "$f" ]; then
              if ! head -5 "$f" | grep -q "^---"; then
                echo "ERROR: $f missing frontmatter"
                error=1
              fi
            fi
          done
          for f in skills/*/SKILL.md packs/*/skills/*/SKILL.md; do
            if [ -f "$f" ]; then
              if ! head -5 "$f" | grep -q "^---"; then
                echo "ERROR: $f missing frontmatter"
                error=1
              fi
            fi
          done
          exit $error
