<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <defs>
    <linearGradient id="bgd" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0B1929"/>
      <stop offset="50%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#162D50"/>
    </linearGradient>
    <linearGradient id="g1d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="g2d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2B5EA7"/>
    </linearGradient>
    <linearGradient id="g3d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FCF"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </linearGradient>
    <linearGradient id="hld" x1="0" y1="0" x2="0.85" y2="0.85">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowd" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#2B5EA7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" fill="url(#bgd)"/>
  <rect width="1000" height="420" fill="url(#glowd)"/>

  <!-- Ambient dots -->
  <g>
    <circle cx="80" cy="60" r="1.5" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="920" cy="50" r="1.4" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="50" cy="360" r="1.5" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="950" cy="340" r="1.4" fill="#4A7FCF" opacity="0.15"/>
  </g>

  <!-- Logo — isometric card stack (compact for Dev.to cover) -->
  <g transform="translate(500, 115) scale(0.8)">
    <g transform="matrix(0.707,-0.405,0.707,0.405, 0, 30)">
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#g1d)" opacity="0.85" stroke="#4A7FCF" stroke-width="0.5" stroke-opacity="0.15"/>
      <text x="42" y="42" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5">HOOKS</text>
    </g>
    <g transform="matrix(0.707,-0.405,0.707,0.405, 0, 0)">
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#g2d)" opacity="0.9" stroke="#4A7FCF" stroke-width="0.5" stroke-opacity="0.2"/>
      <text x="42" y="42" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5">SKILLS</text>
    </g>
    <g transform="matrix(0.707,-0.405,0.707,0.405, 0, -30)">
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#g3d)" opacity="0.95" stroke="#CD7F32" stroke-width="0.5" stroke-opacity="0.25"/>
      <text x="42" y="42" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#fff" opacity="0.7" letter-spacing="0.5">AGENTS</text>
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#hld)"/>
    </g>
  </g>

  <!-- Title -->
  <text x="500" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Specialist Agent</text>

  <!-- Subtitle -->
  <text x="500" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#7BA3CC">Your AI development team — any framework, any stack</text>

  <!-- Compact stats -->
  <g>
    <rect x="282" y="335" width="105" height="28" rx="14" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="334.5" y="354" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#A8C8E8">27+ Agents</text>
    <rect x="397" y="335" width="95" height="28" rx="14" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="444.5" y="354" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#A8C8E8">21 Skills</text>
    <rect x="502" y="335" width="95" height="28" rx="14" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="549.5" y="354" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#A8C8E8">Lite Mode</text>
    <rect x="607" y="335" width="110" height="28" rx="14" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="662" y="354" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#A8C8E8">7 Frameworks</text>
  </g>

  <!-- URL -->
  <text x="500" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4A6A8A" letter-spacing="2">specialistagent.com.br</text>

  <!-- Bottom accent line -->
  <rect x="0" y="417" width="1000" height="3" fill="url(#g3d)" opacity="0.6"/>
</svg>
