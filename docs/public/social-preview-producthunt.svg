    <rect x="459" y="630" width="80" height="28" rx="14" fill="#00B4D8" opacity="0.12" stroke="#00B4D8" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="499" y="648.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#00B4D8" opacity="0.9">Cursor</text>
