    <rect x="490" y="580" width="90" height="30" rx="15" fill="#CCCCCC" opacity="0.15" stroke="#CCCCCC" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="535" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#CCCCCC">Next.js</text>
