    <text x="590.5" y="648.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#007ACC" opacity="0.9">VS Code</text>
    <rect x="642" y="630" width="92" height="28" rx="14" fill="#06D6A0" opacity="0.12" stroke="#06D6A0" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="688" y="648.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#06D6A0" opacity="0.9">Windsurf</text>
    <rect x="744" y="630" width="80" height="28" rx="14" fill="#EF476F" opacity="0.12" stroke="#EF476F" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="784" y="648.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#EF476F" opacity="0.9">Codex</text>
    <rect x="834" y="630" width="92" height="28" rx="14" fill="#FFD166" opacity="0.12" stroke="#FFD166" stroke-width="0.5" stroke-opacity="0.25"/>
    <text x="880" y="648.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#FFD166" opacity="0.9">OpenCode</text>
