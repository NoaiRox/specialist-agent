    <rect x="890" y="580" width="90" height="30" rx="15" fill="#42b883" opacity="0.2" stroke="#42b883" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="935" y="600" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#42b883">Vue 3</text>
