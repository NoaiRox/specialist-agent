<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0B1929"/>
      <stop offset="50%" stop-color="#0F2340"/>
      <stop offset="100%" stop-color="#162D50"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2B5EA7"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7FCF"/>
      <stop offset="100%" stop-color="#CD7F32"/>
    </linearGradient>
    <linearGradient id="hl" x1="0" y1="0" x2="0.85" y2="0.85">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#2B5EA7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Ambient dots -->
  <g>
    <circle cx="100" cy="95" r="1.7" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1180" cy="76" r="1.6" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="64" cy="546" r="1.7" fill="#4A7FCF" opacity="0.15"/>
    <circle cx="1216" cy="514" r="1.6" fill="#4A7FCF" opacity="0.15"/>
    <line x1="100" y1="95" x2="190" y2="284" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
    <line x1="1180" y1="76" x2="1120" y2="347" stroke="#4A7FCF" stroke-width="0.5" opacity="0.06"/>
  </g>

  <!-- Logo — isometric card stack -->
  <g transform="translate(640, 170)">
    <g transform="matrix(0.707,-0.405,0.707,0.405, 0, 30)">
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#g1)" opacity="0.85" stroke="#4A7FCF" stroke-width="0.5" stroke-opacity="0.15"/>
      <text x="42" y="42" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5">HOOKS</text>
    </g>
    <g transform="matrix(0.707,-0.405,0.707,0.405, 0, 0)">
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#g2)" opacity="0.9" stroke="#4A7FCF" stroke-width="0.5" stroke-opacity="0.2"/>
      <text x="42" y="42" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#fff" opacity="0.5" letter-spacing="0.5">SKILLS</text>
    </g>
    <g transform="matrix(0.707,-0.405,0.707,0.405, 0, -30)">
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#g3)" opacity="0.95" stroke="#CD7F32" stroke-width="0.5" stroke-opacity="0.25"/>
      <text x="42" y="42" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#fff" opacity="0.7" letter-spacing="0.5">AGENTS</text>
      <rect x="-55" y="-55" width="110" height="110" rx="14" fill="url(#hl)"/>
    </g>
  </g>

  <!-- Title -->
  <text x="640" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Specialist Agent</text>

  <!-- Subtitle -->
  <text x="640" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#7BA3CC">Your AI development team — any framework, any stack</text>

  <!-- Stats row -->
  <g>
    <rect x="402" y="459" width="120" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="462" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">27+ Agents</text>
    <rect x="534" y="459" width="110" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="589" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">21 Skills</text>
    <rect x="656" y="459" width="110" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="711" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">Lite Mode</text>
    <rect x="778" y="459" width="100" height="32" rx="16" fill="#1E3A5F" stroke="#2B5EA7" stroke-width="1" opacity="0.6"/>
    <text x="828" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#A8C8E8">7 Packs</text>
  </g>

  <!-- Frameworks row -->
  <g>
    <rect x="295" y="510" width="90" height="30" rx="15" fill="#DD0031" opacity="0.2" stroke="#DD0031" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="340" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#DD0031">Angular</text>
    <rect x="395" y="510" width="90" height="30" rx="15" fill="#FF5D01" opacity="0.2" stroke="#FF5D01" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="440" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#FF5D01">Astro</text>
    <rect x="495" y="510" width="90" height="30" rx="15" fill="#CCCCCC" opacity="0.15" stroke="#CCCCCC" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="540" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#CCCCCC">Next.js</text>
    <rect x="595" y="510" width="90" height="30" rx="15" fill="#00DC82" opacity="0.2" stroke="#00DC82" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="640" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00DC82">Nuxt</text>
    <rect x="695" y="510" width="90" height="30" rx="15" fill="#61DAFB" opacity="0.2" stroke="#61DAFB" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="740" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#61DAFB">React</text>
    <rect x="795" y="510" width="90" height="30" rx="15" fill="#FF3E00" opacity="0.2" stroke="#FF3E00" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="840" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#FF3E00">SvelteKit</text>
    <rect x="895" y="510" width="90" height="30" rx="15" fill="#42b883" opacity="0.2" stroke="#42b883" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="940" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#42b883">Vue 3</text>
  </g>

  <!-- URL -->
  <text x="640" y="610" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4A6A8A" letter-spacing="2">specialistagent.com.br</text>

  <!-- Bottom accent line -->
  <rect x="0" y="637" width="1280" height="3" fill="url(#g3)" opacity="0.6"/>
</svg>
